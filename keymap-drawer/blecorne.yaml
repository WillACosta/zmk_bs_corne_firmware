combos:
- p: [1, 2]
  k: $$mdi:keyboard-tab$$
- p: [18, 19]
  k: $$mdi:home$$
- p: [20, 21]
  k: {t: End, type: ghost}
- p: [10, 9]
  k: $$mdi:backspace$$
- p: [30, 31]
  k: $$mdi:chevron-double-down$$
- p: [7, 6]
  k: $$mdi:chevron-double-up$$
- p: [25, 26]
  k: Ctl+W
- p: [13, 14]
  k: Ctl+A
