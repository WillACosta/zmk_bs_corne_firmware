draw_config:
  dark_mode: true
  n_columns: 1
  key_rx: 6
  key_ry: 6
  footer_text: "Boardsource Wireless Corne SMT"
  svg_extra_style: |
    svg.keymap {
      background: #11101a;
      fill: #f5f3ff;
    }

    rect.key {
      fill: #201b2f;
    }

    rect.key,
    rect.combo {
      stroke: #7c3aed;
      stroke-width: 1.2;
    }

    rect.held,
    rect.combo.held,
    rect.combo,
    rect.combo-separate {
      fill: #4c1d95;
      stroke: #c084fc;
    }

    rect.trans {
      fill: #151320;
      stroke: #40345f;
    }

    rect.ghost,
    rect.combo.ghost {
      stroke: #a78bfa;
    }

    text.label,
    text.footer {
      fill: #e9d5ff;
      stroke: #11101a;
    }

    text.hold,
    text.shifted,
    text.left,
    text.right,
    text.tl,
    text.tr,
    text.bl,
    text.br,
    text.combo {
      fill: #d8b4fe;
    }

    text.trans {
      fill: #6d6383;
    }

    path.combo {
      stroke: #a78bfa;
    }

parse_config:
  trans_legend:
    t: ""
    type: trans
  raw_binding_map:
    "&bt BT_CLR": "BT CLR"
    "&bt BT_SEL 0": "BT 0"
    "&bt BT_SEL 1": "BT 1"
    "&bt BT_SEL 2": "BT 2"
    "&bt BT_SEL 3": "BT 3"
    "&bt BT_SEL 4": "BT 4"
