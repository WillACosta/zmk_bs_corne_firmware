# Uncomment the 'shield: nice_view' lines below if you are using nice!view displays.
# Additionally, you should enable the display feature in 'config/blecorne.conf'.
---
include:
  - board: blecorne_left
    shield: nice_view
  - board: blecorne_right
    shield: nice_view

  # Build a "settings reset" firmware to clear persistent settings
  # (bluetooth connections, ZMK Studio keymap overrides, etc).
  # Display is explicitly disabled because settings_reset has no display
  # device in its device tree, which would otherwise cause a compile error.
  # - board: blecorne_left
  #   shield: settings_reset
  #   cmake-args: -DCONFIG_ZMK_DISPLAY=n -DCONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=n

  # - board: blecorne_right
  #   shield: settings_reset
  #   cmake-args: -DCONFIG_ZMK_DISPLAY=n -DCONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=n
