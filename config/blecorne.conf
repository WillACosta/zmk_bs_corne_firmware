## Power saving, sleep after 1h inactive (1*60*60*1000ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_PM_SOFT_OFF=y

# Disable ZMK Studio to work around a known issue where the central split half
# fails to wake up from deep sleep (Zephyr 4.1 power management regression).
CONFIG_ZMK_STUDIO=n


## Increase BLE range and connection stability (especially for metal cases)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Enable experimental connection settings to improve stability and range
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# Explicitly disable 2M PHY to force 1M PHY, improving receiver sensitivity and signal penetration
CONFIG_BT_CTLR_PHY_2M=n
# Workaround for connection drops on certain host OS (Windows/macOS) by disabling GATT subscription enforcement
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8

## Enable Human Interface Device Feedback
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
CONFIG_ZMK_HID_INDICATORS=y

## Enable mouse / pointing subsystem (required for mmv, msc, mkp behaviors)
CONFIG_ZMK_POINTING=y

# Config for displays
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONTSERRAT_26=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_26=y

CONFIG_ZMK_WIDGET_WPM_STATUS=n
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

# Enable telemetry
# Report battery statue for both halves
CONFIG_BT_BAS=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# ZMK Custom BLE Status service
CONFIG_ZMK_CUSTOM_STATUS_BLE=y

# Trigger build: add peripheral battery BLE characteristic (5F3A0003)